<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PortalProv — Variantes Visuales</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="src/tokens.css">
<style>
  /* Variantes canvas always uses warm bg from design canvas; ensure body bg is default */
  body { background: #f0eee9; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script src="src/data.js"></script>
<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/components.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/variants.jsx"></script>
<script type="text/babel" src="src/design-canvas.jsx"></script>

<script type="text/babel" data-presets="react">

function App() {
  return (
    <DesignCanvas>
      <DCSection id="dashboard" title="Layouts de Dashboard" subtitle="Tres formas de presentar la información de inicio para Buyer">
        <DCArtboard id="dash-hero" label="A · Hero KPI" width={840} height={760}>
          <DashHero />
        </DCArtboard>
        <DCArtboard id="dash-grid" label="B · Grid denso" width={840} height={760}>
          <DashGrid />
        </DCArtboard>
        <DCArtboard id="dash-list" label="C · Lista ejecutiva" width={840} height={760}>
          <DashList />
        </DCArtboard>
      </DCSection>

      <DCSection id="sidebar" title="Sidebar" subtitle="Patrones de navegación lateral">
        <DCArtboard id="sb-expanded" label="A · Expandido" width={240} height={620}>
          <SidebarExpanded />
        </DCArtboard>
        <DCArtboard id="sb-collapsed" label="B · Colapsado" width={72} height={620}>
          <SidebarCollapsed />
        </DCArtboard>
        <DCArtboard id="sb-sectioned" label="C · Con secciones" width={240} height={620}>
          <SidebarSectioned />
        </DCArtboard>
      </DCSection>

      <DCSection id="tables" title="Estilos de tabla" subtitle="Densidad y separación visual">
        <DCArtboard id="t-bordered" label="A · Bordered" width={720} height={520}>
          <TableBordered />
        </DCArtboard>
        <DCArtboard id="t-striped" label="B · Striped" width={720} height={520}>
          <TableStriped />
        </DCArtboard>
        <DCArtboard id="t-minimal" label="C · Minimal" width={720} height={520}>
          <TableMinimal />
        </DCArtboard>
      </DCSection>

      <DCSection id="empty" title="Estados vacíos" subtitle="Cómo invitar al primer dato">
        <DCArtboard id="e-illus" label="A · Ilustración + CTA" width={620} height={520}>
          <EmptyIllustration />
        </DCArtboard>
        <DCArtboard id="e-minimal" label="B · Minimal" width={620} height={520}>
          <EmptyMinimal />
        </DCArtboard>
        <DCArtboard id="e-cta" label="C · CTA grande" width={620} height={520}>
          <EmptyCTA />
        </DCArtboard>
      </DCSection>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
